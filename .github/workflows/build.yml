name: Flutter CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Clona tu código fuente
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Configura Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Instala Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Genera las carpetas nativas de Android
      - name: Generate Android Native Folders
        run: flutter create . --platforms=android

      # 5. Inyecta SDK mínimo y permisos de cámara
      - name: Inject Camera & SDK Requirements
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/g' android/app/build.gradle.kts
            sed -i 's/minSdk = 21/minSdk = 24/g' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' android/app/build.gradle
            sed -i 's/minSdkVersion 21/minSdkVersion 24/g' android/app/build.gradle
          fi
          
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA"/>' android/app/src/main/AndroidManifest.xml

      # 6. LA SOLUCIÓN AL R8: Crea reglas ProGuard para que no rompa el ML Kit
      - name: Fix R8 Minifier / ProGuard rules
        run: |
          # Creamos el archivo con las reglas que le dicen a R8 "no toques nada de Google ML Kit"
          echo "-dontwarn com.google.mlkit.**" > android/app/proguard-rules.pro
          echo "-keep class com.google.mlkit.** { *; }" >> android/app/proguard-rules.pro
          
          # Le decimos a Gradle que use este archivo que acabamos de crear
          if [ -f android/app/build.gradle.kts ]; then
            sed -i '/targetSdk/a \        proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i '/targetSdkVersion/a \        proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"' android/app/build.gradle
          fi

      # 7. Descarga paquetes
      - name: Install Dependencies
        run: flutter pub get

      # 8. Compila el APK
      - name: Build APK Release
        run: flutter build apk --release

      # 9. Sube el APK final
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
