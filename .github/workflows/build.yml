name: Flutter CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Clona tu código fuente (tu carpeta lib y pubspec)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Configura Java en el servidor
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Instala Flutter en el servidor
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Construye la carpeta de Android faltante
      - name: Generate Android Native Folders
        run: flutter create . --platforms=android

      # 5. INYECCIÓN INTELIGENTE: Soporta archivos modernos (Kotlin DSL) y clásicos (Groovy)
      - name: Inject ML Kit & Camera Requirements
        run: |
          # Ajustar el SDK mínimo según el tipo de archivo que Flutter haya generado
          if [ -f android/app/build.gradle.kts ]; then
            echo "🔧 Archivo moderno Kotlin DSL detectado. Modificando..."
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/g' android/app/build.gradle.kts
            sed -i 's/minSdk = 21/minSdk = 24/g' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            echo "🔧 Archivo clásico Groovy detectado. Modificando..."
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' android/app/build.gradle
            sed -i 's/minSdkVersion 21/minSdkVersion 24/g' android/app/build.gradle
          else
            echo "❌ Error: No se encontró el archivo de configuración de Gradle."
            exit 1
          fi
          
          # Inyectar el permiso de la cámara de forma segura en el Manifest
          echo "📸 Inyectando permiso de cámara..."
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA"/>' android/app/src/main/AndroidManifest.xml

      # 6. Descarga los paquetes
      - name: Install Dependencies
        run: flutter pub get

      # 7. Compila el archivo APK de lanzamiento
      - name: Build APK Release
        run: flutter build apk --release

      # 8. Sube el APK a GitHub
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
