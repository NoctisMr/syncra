name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Generar carpeta Android nativa
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          else
            echo "La carpeta android/ ya existe."
          fi

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: ⚙️ Generar código de Hive
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🔧 Configurar SDK para ML Kit de forma segura
        run: |
          # Inyectamos la versión mínima requerida por ML Kit (24) sin romper Gradle
          echo "flutter.minSdkVersion=24" >> android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties

      - name: 🏗️ Compilar APK Release
        run: flutter build apk --release

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/*.apk
          
