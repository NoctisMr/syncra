name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Generar carpeta Android nativa
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          else
            echo "La carpeta android/ ya existe."
          fi

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: ⚙️ Generar código de Hive
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🛡️ Configurar reglas de ProGuard (Bypass ML Kit)
        run: |
          # Creamos el archivo de reglas para proteger ML Kit de la eliminación
          mkdir -p android/app
          echo "-keep class com.google.mlkit.** { *; }" > android/app/proguard-rules.pro
          echo "-dontwarn com.google.mlkit.**" >> android/app/proguard-rules.pro
          echo "-keep class com.google.android.gms.vision.** { *; }" >> android/app/proguard-rules.pro
          echo "-dontwarn com.google.android.gms.vision.**" >> android/app/proguard-rules.pro

      - name: 🔧 Configurar SDK 36 y Desactivar R8
        run: |
          # 1. Declarar versiones requeridas en las propiedades locales
          echo "flutter.minSdkVersion=24" >> android/local.properties
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties
          
          # 2. Forzar SDK 36 directamente en el build.gradle de la app
          sed -i -E 's/compileSdkVersion [0-9]+/compileSdkVersion 36/g' android/app/build.gradle || true
          sed -i -E 's/targetSdkVersion [0-9]+/targetSdkVersion 36/g' android/app/build.gradle || true
          sed -i -E 's/minSdkVersion [0-9]+/minSdkVersion 24/g' android/app/build.gradle || true
          
          # 3. Desactivar R8 inyectando minifyEnabled false en el bloque release
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.debug\n            minifyEnabled false\n            shrinkResources false\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"/g' android/app/build.gradle || true
          
          # 4. Someter a file_picker y otros plugins para que usen SDK 36 obligatoriamente
          echo "" >> android/build.gradle
          echo "subprojects {" >> android/build.gradle
          echo "    afterEvaluate { project ->" >> android/build.gradle
          echo "        if (project.hasProperty('android')) {" >> android/build.gradle
          echo "            project.android {" >> android/build.gradle
          echo "                compileSdkVersion 36" >> android/build.gradle
          echo "            }" >> android/build.gradle
          echo "        }" >> android/build.gradle
          echo "    }" >> android/build.gradle
          echo "}" >> android/build.gradle

      - name: 🏗️ Compilar APK Release
        run: flutter build apk --release

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/*.apk
          
