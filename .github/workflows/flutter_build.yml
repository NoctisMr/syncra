name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: 🪄 Generar carpeta Android nativa
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: ⚙️ Generar código de Hive
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🛡️ Inyección Definitiva (SDK 36 + ProGuard R8)
        run: |
          # 1. Crear archivo ProGuard para decirle a R8 que ignore las clases faltantes de ML Kit
          cat <<EOF > android/app/proguard-rules.pro
          -dontwarn com.google.mlkit.vision.text.**
          -keep class com.google.mlkit.vision.text.** { *; }
          EOF

          # 2. Forzar SDK 36 y SDK 24 en Kotlin DSL (El estándar actual de Flutter)
          KTS_FILE="android/app/build.gradle.kts"
          if [ -f "$KTS_FILE" ]; then
            # Reemplazar variables dinámicas por números fijos de SDK
            sed -i 's/flutter.compileSdkVersion/36/g' $KTS_FILE
            sed -i 's/flutter.targetSdkVersion/36/g' $KTS_FILE
            sed -i 's/flutter.minSdkVersion/24/g' $KTS_FILE
            
            # Vincular el archivo ProGuard al compilador
            sed -i '/getByName("release") {/a \            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")' $KTS_FILE
          fi

          # 3. Forzar SDK 36 y SDK 24 en Groovy (Soporte heredado por seguridad)
          GRADLE_FILE="android/app/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            # Reemplazar variables dinámicas por números fijos de SDK
            sed -i 's/flutter.compileSdkVersion/36/g' $GRADLE_FILE
            sed -i 's/flutter.targetSdkVersion/36/g' $GRADLE_FILE
            sed -i 's/flutter.minSdkVersion/24/g' $GRADLE_FILE
            
            # Vincular el archivo ProGuard al compilador
            sed -i '/release {/a \            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"' $GRADLE_FILE
          fi

      - name: 🏗️ Compilar APK Release
        run: flutter build apk --release

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Syncra-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
