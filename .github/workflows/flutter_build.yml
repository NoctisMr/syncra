name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Instalar dependencias
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: 🛠️ Preparar configuración de Android
        run: |
          # 1. Crear estructura nativa si no existe
          flutter create --platforms=android .
          
          # 2. Inyectar local.properties para que Gradle encuentre el SDK y Flutter
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # 3. Crear un archivo gradle.properties optimizado
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: 🏗️ Compilar APK
        # Usamos el comando directo de Flutter sin --no-shrink primero.
        # Si esto falla, el --no-shrink es opcional, pero probemos la forma estándar.
        run: flutter build apk --release

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Syncra-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
