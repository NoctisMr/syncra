name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: 🪄 Generar carpeta Android nativa
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: ⚙️ Generar código de Hive
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🛡️ Solución Definitiva SDK y ML Kit
        run: |
          # 1. Forzar SDKs oficialmente vía properties (Funciona para Kotlin DSL y Groovy)
          echo "flutter.minSdkVersion=24" >> android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties

          # 2. Desactivar R8/Minify en Kotlin DSL (El estándar actual de Flutter)
          KTS_FILE="android/app/build.gradle.kts"
          if [ -f "$KTS_FILE" ]; then
            # Reemplazo seguro si la propiedad existe
            sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/g' $KTS_FILE
            sed -i 's/isShrinkResources = true/isShrinkResources = false/g' $KTS_FILE
            # Inyección forzada en el bloque de release para apagar R8 y salvar ML Kit
            sed -i '/getByName("release") {/a \            isMinifyEnabled = false\n            isShrinkResources = false' $KTS_FILE
          fi

          # 3. Soporte heredado por si la versión genera archivos Groovy
          GRADLE_FILE="android/app/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            sed -i 's/minifyEnabled true/minifyEnabled false/g' $GRADLE_FILE
            sed -i 's/shrinkResources true/shrinkResources false/g' $GRADLE_FILE
            sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.debug\n            minifyEnabled false\n            shrinkResources false/g' $GRADLE_FILE
          fi

      - name: 🏗️ Compilar APK Release
        run: flutter build apk --release

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Syncra-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
