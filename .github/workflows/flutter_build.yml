name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Instalar dependencias
        run: |
          flutter clean
          flutter pub get

      - name: ⚙️ Generar archivos nativos y Build Runner
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🛡️ Aplicar Parches (SDK 36 + Desactivar R8)
        run: |
          # 1. Forzar el uso del SDK 36 en la configuración local de Android
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties
          echo "flutter.minSdkVersion=24" >> android/local.properties

          # 2. Desactivar R8 y Shrink (Minification) en build.gradle para evitar errores de ML Kit
          # Esto busca las líneas de minifyEnabled y shrinkResources y las pone en false
          sed -i 's/minifyEnabled true/minifyEnabled false/g' android/app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' android/app/build.gradle
          
          # Si las líneas no existen, las añadimos dentro del bloque buildTypes/release
          if ! grep -q "minifyEnabled false" android/app/build.gradle; then
             sed -i '/release {/a \            minifyEnabled false\n            shrinkResources false' android/app/build.gradle
          fi

      - name: 🏗️ Compilar APK Release
        run: flutter build apk --release

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/*.apk
          
