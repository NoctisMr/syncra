name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: 🧹 Limpiar caché de Gradle y compilaciones previas
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          rm -rf build/
          flutter clean

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Generar archivos nativos (Android)
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          else
            echo "La carpeta android/ ya existe — omitiendo flutter create"
          fi

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: ⚙️ Ejecutar Build Runner
        run: |
          rm -rf .dart_tool
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🛡️ Configurar reglas de ProGuard
        run: |
          mkdir -p android/app
          cat << 'EOF' > android/app/proguard-rules.pro
          -dontwarn com.google.mlkit.vision.text.chinese.**
          -dontwarn com.google.mlkit.vision.text.japanese.**
          -dontwarn com.google.mlkit.vision.text.korean.**
          -dontwarn com.google.mlkit.vision.text.devanagari.**
          -dontwarn com.google.mlkit.vision.text.**
          EOF

      - name: 🔧 Crear configuración de Gradle
        run: |
          mkdir -p android
          cat > android/gradle.properties <<'EOF'
org.gradle.jvmargs=-Xmx4096m
org.gradle.parallel=true
org.gradle.caching=true
flutter.compileSdkVersion=36
flutter.minSdkVersion=24
flutter.minCompileSdk=34
flutter.ndkVersion=26.1.10909125
android.disableResourceValidation=true
error.on.mismatched.compile.sdk.version=false
android.enableJetifier=true
android.useAndroidX=true
android.enableR8=true
EOF

      - name: 🛠️ Crear build.gradle raíz
        run: |
          mkdir -p android
          cat > android/build.gradle <<'EOF'
buildscript {
    ext.kotlin_version = '1.8.10'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.0.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    project.evaluationDependsOn(':app')
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
EOF

      - name: 📱 Crear build.gradle app
        run: |
          mkdir -p android/app
          cat > android/app/build.gradle <<'EOF'
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    compileSdkVersion 36
    minCompileSdk 34
    ndkVersion "26.1.10909125"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.syncra_app"
        minSdkVersion 24
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.10"
}
EOF

      - name: 🏗️ Compilar APK Release
        run: |
          set -e
          flutter clean
          flutter pub get
          flutter build apk --release --split-per-abi -vv

      - name: 📦 Mostrar artefactos
        if: always()
        run: |
          echo "Listando salidas de compilación:"
          ls -la build/app/outputs/flutter-apk || true
          echo "Buscando archivos APK:"
          find build -type f -name '*.apk' -print || true

      - name: 📤 Subir artefacto
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/*.apk
