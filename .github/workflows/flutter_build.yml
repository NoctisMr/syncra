name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Generar carpeta Android nativa
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: ⚙️ Generar código de Hive
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 📝 Forzar SDK 36 en Propiedades
        run: |
          echo "flutter.minSdkVersion=24" >> android/local.properties
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties

      - name: 🛡️ Inyección Inteligente (Kotlin / Groovy)
        run: |
          cat << 'EOF' > fix_gradle.py
          import os, re

          # 1. Crear reglas para proteger ML Kit
          os.makedirs("android/app", exist_ok=True)
          with open("android/app/proguard-rules.pro", "w") as f:
              f.write("-keep class com.google.mlkit.** { *; }\n")
              f.write("-dontwarn com.google.mlkit.**\n")

          # 2. Desactivar R8 adaptándose al lenguaje (KTS o Groovy)
          kts = "android/app/build.gradle.kts"
          groovy = "android/app/build.gradle"

          if os.path.exists(kts):
              with open(kts, "r") as f: text = f.read()
              text = re.sub(r"release\s*\{", "release {\n            isMinifyEnabled = false\n            isShrinkResources = false\n", text)
              with open(kts, "w") as f: f.write(text)
          elif os.path.exists(groovy):
              with open(groovy, "r") as f: text = f.read()
              text = re.sub(r"release\s*\{", "release {\n            minifyEnabled false\n            shrinkResources false\n", text)
              with open(groovy, "w") as f: f.write(text)
          EOF
          python3 fix_gradle.py

      - name: 🏗️ Compilar APK Release
        run: flutter build apk --release

      - name: 📤 Subir artefacto final (APK)
        uses: actions/upload-artifact@v4
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/*.apk
          
