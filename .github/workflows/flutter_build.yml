name: Syncra App Build (CI/CD)

# Se ejecuta cada vez que haces un push o un pull request a la rama principal
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      # 1. Clona el código de tu repositorio
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      # 2. Configura Java (Requisito indispensable para compilar Android y ML Kit)
      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Configura el entorno de Flutter (Usa caché para acelerar futuras compilaciones)
      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Descarga las dependencias del pubspec.yaml
      - name: 📦 Instalar dependencias
        run: flutter pub get

      # 5. Genera los archivos automáticos (Hive Adapters)
      - name: ⚙️ Ejecutar Build Runner (Hive)
        run: dart run build_runner build --delete-conflicting-outputs

      # 6. Aplica los íconos de la app configurados en el pubspec
      - name: 🎨 Generar íconos nativos
        run: dart run flutter_launcher_icons

      # 7. Analiza el código en busca de errores sintácticos antes de compilar
      - name: 🔍 Analizar código
        run: flutter analyze

      # 8. Compila la aplicación en formato APK (Release/Producción)
      - name: 🏗️ Compilar APK
        run: flutter build apk --release

      # 9. Sube el APK generado para que lo puedas descargar desde GitHub
      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        with:
          name: syncra_app_android_apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
          
