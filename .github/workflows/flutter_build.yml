name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: 🛡️ Configurar reglas de ProGuard (Bypass errores R8 de ML Kit)
        run: |
          mkdir -p android/app
          cat << 'EOF' > android/app/proguard-rules.pro
          -dontwarn com.google.mlkit.vision.text.chinese.**
          -dontwarn com.google.mlkit.vision.text.japanese.**
          -dontwarn com.google.mlkit.vision.text.korean.**
          -dontwarn com.google.mlkit.vision.text.devanagari.**
          -dontwarn com.google.mlkit.vision.text.**
          EOF

      - name: 🔧 Forzar SDK 36 de forma segura
        run: |
          # Añadir propiedades a gradle.properties
          echo "flutter.compileSdkVersion=36" >> android/gradle.properties
          echo "flutter.minSdkVersion=24" >> android/gradle.properties
          
          # Reemplazar versiones de compilación en los build.gradle de manera segura
          find android -name "build.gradle" -print0 | xargs -0 -n1 sed -i -E 's/compileSdkVersion[[:space:]]+[0-9]+/compileSdkVersion 36/g' || true

      - name: ⚙️ Ejecutar Build Runner
        run: |
          rm -rf .dart_tool
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🏗️ Compilar APK (Release)
        run: |
          flutter clean
          flutter build apk --release --split-per-abi --verbose

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/*.apk
          
