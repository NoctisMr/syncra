name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Generar archivos nativos (Android) — solo si falta
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          else
            echo "La carpeta android/ ya existe — omitiendo flutter create"
          fi

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: ⚙️ Ejecutar Build Runner
        run: |
          rm -rf .dart_tool
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🛡️ Configurar reglas de ProGuard (Bypass errores R8 de ML Kit)
        run: |
          mkdir -p android/app
          cat << 'EOF' > android/app/proguard-rules.pro
          -dontwarn com.google.mlkit.vision.text.chinese.**
          -dontwarn com.google.mlkit.vision.text.japanese.**
          -dontwarn com.google.mlkit.vision.text.korean.**
          -dontwarn com.google.mlkit.vision.text.devanagari.**
          -dontwarn com.google.mlkit.vision.text.**
          EOF

      - name: 🔧 Forzar SDK 36 en la App y todos los Plugins (seguro)
        run: |
          mkdir -p android
          cat >> android/gradle.properties <<'EOF'
          flutter.compileSdkVersion=36
          flutter.minSdkVersion=24
          EOF
          
          # Reemplaza de forma segura la línea de compileSdkVersion en cualquier submódulo
          find android -name build.gradle -print0 | \
            xargs -0 -n1 sed -i -E 's/compileSdkVersion[[:space:]]+[0-9]+/compileSdkVersion 36/g' || true
          
          echo "Archivos build.gradle modificados:"
          git --no-pager diff -- android || true

          # Nota: Si tu proyecto usa variables en lugar de números directos para la versión,
          # revisa los logs de este paso para confirmar los cambios.

      - name: 🏗️ Compilar APK (Release Limpio)
        run: |
          set -e
          flutter clean
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: 📦 Mostrar artefactos generados (debug)
        if: always()
        run: |
          echo "Listando salidas de compilación:"
          ls -la build/app/outputs/flutter-apk || true
          echo "Buscando archivos APK recursivamente:"
          find build -type f -name '*.apk' -print || true

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/*.apk
          
