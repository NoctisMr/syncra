name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Generar carpeta Android nativa
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: ⚙️ Generar código de Hive
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🛡️ Solución Nuclear ML Kit (Apagar R8 de Android)
        run: |
          # Esto inyecta "minifyEnabled false" justo donde Android lo necesita, matando a R8 por completo
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.debug\n            minifyEnabled false\n            shrinkResources false/g' android/app/build.gradle

      - name: 🔧 Solución Nuclear SDK 36 (Someter a file_picker)
        run: |
          # 1. Fuerza los SDKs en la configuración principal de la app
          sed -i -E 's/(compileSdk|compileSdkVersion).*/compileSdkVersion 36/g' android/app/build.gradle
          sed -i -E 's/(targetSdk|targetSdkVersion).*/targetSdkVersion 36/g' android/app/build.gradle
          sed -i -E 's/(minSdk|minSdkVersion).*/minSdkVersion 24/g' android/app/build.gradle
          
          # 2. Inyecta una regla universal obligando a TODO plugin a compilar en 36
          echo "" >> android/build.gradle
          echo "subprojects {" >> android/build.gradle
          echo "    afterEvaluate { project ->" >> android/build.gradle
          echo "        if (project.hasProperty('android')) {" >> android/build.gradle
          echo "            project.android {" >> android/build.gradle
          echo "                compileSdkVersion 36" >> android/build.gradle
          echo "            }" >> android/build.gradle
          echo "        }" >> android/build.gradle
          echo "    }" >> android/build.gradle
          echo "}" >> android/build.gradle

      - name: 🏗️ Compilar APK Release
        run: flutter build apk --release

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/*.apk
          
