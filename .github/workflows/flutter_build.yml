name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Generar archivos nativos (Android)
        run: flutter create --platforms=android .

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: 🛡️ Configurar reglas de ProGuard (Bypass errores R8 de ML Kit)
        # Esto crea automáticamente el archivo de reglas ProGuard que pide R8
        run: |
          mkdir -p android/app
          cat << 'EOF' > android/app/proguard-rules.pro
          # Ignorar advertencias de clases ausentes de ML Kit (Idiomas asiáticos que no usamos)
          -dontwarn com.google.mlkit.vision.text.chinese.**
          -dontwarn com.google.mlkit.vision.text.japanese.**
          -dontwarn com.google.mlkit.vision.text.korean.**
          -dontwarn com.google.mlkit.vision.text.devanagari.**
          -dontwarn com.google.mlkit.vision.text.**
          EOF

      - name: 🔧 Forzar SDK 36 en la App y todos los Plugins
        # Resolvemos el conflicto de versiones de Android exigiendo el SDK 36 globalmente
        run: |
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.minSdkVersion=24" >> android/local.properties
          
          cat << 'EOF' >> android/build.gradle

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 36
                      }
                  }
              }
          }
          EOF

      - name: ⚙️ Ejecutar Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🏗️ Compilar APK (Release Limpio)
        # Ejecutamos la compilación estándar ya protegida por las reglas ProGuard anteriores
        run: flutter build apk --release

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk
          
