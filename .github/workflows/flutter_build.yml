name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: 🪄 Preparar estructura Android
        run: |
          # Creamos la estructura, pero luego vamos a sobrescribir los archivos críticos
          flutter create --platforms=android .
          
          # Creamos un archivo gradle.properties estable
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> android/gradle.properties

      - name: 🛡️ Inyectar configuración inamovible (SDK 36 + ProGuard)
        run: |
          # Crear reglas ProGuard para que R8 no toque nada de ML Kit
          echo "-keep class com.google.mlkit.** { *; }" > android/app/proguard-rules.pro
          echo "-dontwarn com.google.mlkit.**" >> android/app/proguard-rules.pro

          # Sobrescribir build.gradle para asegurar SDK 36
          cat <<EOF > android/app/build.gradle
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
          }

          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "\$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

          android {
              compileSdkVersion 36
              defaultConfig {
                  applicationId "com.example.syncra"
                  minSdkVersion 24
                  targetSdkVersion 36
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
          }
          EOF

      - name: 🏗️ Compilar APK Release
        run: flutter build apk --release --no-shrink

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Syncra-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
