name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite que actives la compilación con un botón manualmente

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Generar archivos nativos (Android)
        run: flutter create --platforms=android .

      - name: 🔧 Ajustar minSdkVersion para OCR
        run: |
          find android -name "build.gradle" -exec sed -i 's/flutter.minSdkVersion/24/g' {} +
          find android -name "build.gradle.kts" -exec sed -i 's/flutter\.minSdkVersion/24/g' {} +

      - name: 🧹 Auto-Corregir Rutas de Importación (Magia para Celular)
        run: |
          find lib -type f -name "*.dart" -exec sed -i -E "s/import 'package:syncra_app\/.*\/([^\/]+\.dart)';/import '\1';/g" {} +
          find lib -type f -name "*.dart" -exec sed -i -E "s/import '\.\.?\/.*\/([^\/]+\.dart)';/import '\1';/g" {} +

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: ⚙️ Ejecutar Build Runner (Generar Base de Datos)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🏗️ Compilar APK (Release)
        run: flutter build apk --release

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk
        
