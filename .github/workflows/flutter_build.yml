name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Generar archivos nativos (Android)
        run: flutter create --platforms=android .

      - name: 📦 Instalar dependencias
        # Es vital que esto ocurra ANTES del parcheo
        run: flutter pub get

      - name: 🔧 Parchear SDKs de plugins a la fuerza
        run: |
          # 1. Configurar la aplicación principal
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.minSdkVersion=24" >> android/local.properties
          
          # 2. Rastrear la caché del servidor y obligar a todos los plugins a usar el SDK 36
          find ~/.pub-cache -type f -name "build.gradle" -exec sed -i -E 's/(compileSdk|compileSdkVersion)[ ]*(=)?[ ]*[0-9]+/\1 36/g' {} + || true

      - name: ⚙️ Ejecutar Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🏗️ Compilar APK (Bypass R8)
        # La bandera --no-shrink evita que Android elimine las clases de ML Kit
        run: flutter build apk --release --no-shrink

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk
          
