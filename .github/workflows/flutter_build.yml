name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: 🪄 Generar carpeta Android nativa
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: ⚙️ Generar código de Hive
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🛡️ Forzar SDK 36 (Solución file_picker)
        run: |
          # Inyectamos los SDKs directamente a las propiedades locales de Android
          echo "flutter.minSdkVersion=24" >> android/local.properties
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties

      - name: 🏗️ Compilar APK Release (Bypass a R8/ML Kit)
        # La bandera --no-shrink apaga el motor de ofuscación de Android.
        # Aumentará el peso del APK, pero evita el error de "Missing classes".
        run: flutter build apk --release --no-shrink

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Syncra-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
