name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Generar archivos nativos (Android)
        run: flutter create --platforms=android .

      - name: 🔧 Ajustar SDKs y Reglas R8 (ProGuard)
        run: |
          # 1. Inyectar valores en local.properties (Método oficial de Flutter)
          echo "flutter.minSdkVersion=24" >> android/local.properties
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          
          # 2. Forzar reemplazo directo en build.gradle
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' android/app/build.gradle
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/g' android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/g' android/app/build.gradle
          
          # 3. Regla para ofuscador R8 (Salva la compilación final)
          echo "-dontwarn com.google.mlkit.**" > android/app/proguard-rules.pro

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: ⚙️ Ejecutar Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🏗️ Compilar APK (Release)
        run: flutter build apk --release

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk
          
