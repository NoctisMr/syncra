name: syncra

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Preparar entorno Android
        run: |
          flutter create --platforms=android .
          # Forzar versiones mínimas globales para todos los plugins
          echo "android.enableJetifier=true" > android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties

      - name: 🔧 Parchear Build.gradle para evitar conflictos de versión
        run: |
          # Reemplazar versiones de forma agresiva en los archivos de configuración
          find android -name "build.gradle" -exec sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' {} +
          find android -name "build.gradle" -exec sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/g' {} +
          find android -name "build.gradle" -exec sed -i 's/minSdk flutter.minSdkVersion/minSdk 24/g' {} +
          find android -name "build.gradle" -exec sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 36/g' {} +

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: ⚙️ Generar archivos (Build Runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🏗️ Compilar APK (Release)
        run: flutter build apk --release

      - name: 📤 Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk
          
