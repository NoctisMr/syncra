name: syncra
description: Gestión de presupuesto, conversor de divisas y seguimiento de envíos.
publish_to: 'none'
version: 1.4.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.1
  intl: ^0.19.0
  fl_chart: ^0.68.0 # Requerido para el PieChart interactivo
  image_picker: ^1.0.7 # Requerido para la captura de fotos con la cámara
  google_mlkit_text_recognition: ^0.12.0 # Requerido para el escáner OCR de precios

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  
