publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  http: ^1.2.1
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  
  # Dependencias agregadas para solucionar errores
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
