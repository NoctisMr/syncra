name: Syncra App Build (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Descargar repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🪄 Generar archivos nativos (Android)
        run: flutter create --platforms=android .

      - name: 🔧 Ajustar SDKs y reglas ProGuard
        run: |
          find android -name "build.gradle" -exec sed -i 's/flutter.minSdkVersion/24/g' {} +
          find android -name "build.gradle.kts" -exec sed -i 's/flutter\.minSdkVersion/24/g' {} +
          find android -name "build.gradle" -exec sed -i 's/flutter.compileSdkVersion/36/g' {} +
          find android -name "build.gradle.kts" -exec sed -i 's/flutter\.compileSdkVersion/36/g' {} +
          echo "-dontwarn com.google.mlkit.**" > android/app/proguard-rules.pro

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: ⚙️ Ejecutar Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🏗️ Compilar APK (Release)
        run: flutter build apk --release

      - name: 📤 Subir artefacto (APK)
        uses: actions/upload-artifact@v4
        with:
          name: SyncraApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk
          
