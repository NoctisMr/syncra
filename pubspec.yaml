  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.66.0
  
  # Dependencies: Color extraction, Files, CSV, Backup
  palette_generator: ^0.3.3
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  file_picker: ^6.1.1
  csv: ^5.1.1

dev_dependencies:
  flutter_test:
