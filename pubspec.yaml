name: global_wallet_shipping
description: "App de presupuesto, conversión de divisas y cálculo aduanero con Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI y Utilidades
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  
  # Gestor de Estado e Inyección de Dependencias
  provider: ^6.1.2
  
  # Base de Datos Local
  shared_preferences: ^2.2.3
  
  # Peticiones HTTP (Servicio de Divisas)
  http: ^1.2.1
  
  # Hardware y Machine Learning (Conversor OCR)
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
