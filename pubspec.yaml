publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  http: ^1.2.1
  image_picker: ^1.1.2
